name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Go test and analysis gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # gopls is pinned so a gopls release cannot silently change refactoring
      # behavior or flip runtime-gated test skips between CI runs (see issue
      # #78). Bump procedure:
      #   1. Pick a new tag from https://github.com/golang/tools/releases.
      #   2. Update GOPLS_VERSION below.
      #   3. Run the inline gate locally against it
      #      (REFUTE_REQUIRE_GOPLS_INLINE=1 go test ./internal/backend/lsp/),
      #      then the integration suite (go test -tags integration ./internal/),
      #      and update any caveats in docs/support-matrix.md if behavior
      #      changed.
      - name: Install supported Go integration backend
        env:
          GOPLS_VERSION: v0.22.0
        run: |
          go install "golang.org/x/tools/gopls@${GOPLS_VERSION}"

      - name: Install experimental integration backends and fixture dependencies
        continue-on-error: true
        run: |
          rustup component add rust-analyzer
          npm ci --prefix testdata/fixtures/typescript/rename
          npm ci --prefix testdata/fixtures/javascript/rename

      - name: Check Go formatting
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if ((${#go_files[@]} == 0)); then
            exit 0
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run unit tests
        # REFUTE_REQUIRE_GOPLS_INLINE makes the gopls inline capability test
        # fail rather than silently skip, so the pinned gopls is verified to
        # still support inline (issue #78).
        env:
          REFUTE_REQUIRE_GOPLS_INLINE: "1"
        run: go test ./...

      - name: Run unit tests with race detector
        env:
          REFUTE_REQUIRE_GOPLS_INLINE: "1"
        run: go test -race -timeout 120s ./...

      - name: Run supported Go integration tests
        run: go test -tags integration ./internal/

      - name: Run experimental integration tests
        continue-on-error: true
        env:
          REFUTE_EXPERIMENTAL_INTEGRATION: "1"
        run: go test -tags integration ./internal/

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run ShellCheck on tracked shell scripts
        shell: bash
        run: |
          mapfile -t shell_scripts < <(git ls-files '*.sh')
          if ((${#shell_scripts[@]} == 0)); then
            echo "No tracked shell scripts found."
            exit 0
          fi

          shellcheck "${shell_scripts[@]}"

  openrewrite:
    name: OpenRewrite adapter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build OpenRewrite adapter
        run: mvn -B verify --file adapters/openrewrite/pom.xml

  tsmorph:
    name: ts-morph adapter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect ts-morph changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            tsmorph:
              - ".github/workflows/ci.yml"
              - "adapters/tsmorph/**"
              - "internal/backend/tsmorph/**"
              - "testdata/fixtures/javascript/rename/**"
              - "testdata/fixtures/typescript/rename/**"
              - "testdata/adapter-contracts/tsmorph/**"

      - name: Set up Node
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            adapters/tsmorph/package-lock.json
            testdata/fixtures/javascript/rename/package-lock.json
            testdata/fixtures/typescript/rename/package-lock.json

      - name: Set up Go
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ts-morph adapter dependencies
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci --prefix adapters/tsmorph

      - name: Run ts-morph adapter typecheck
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run typecheck --prefix adapters/tsmorph

      - name: Run ts-morph adapter lint
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run lint --prefix adapters/tsmorph

      - name: Run ts-morph adapter tests
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        run: npm test --prefix adapters/tsmorph

      - name: Install TypeScript fixture dependencies
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          npm ci --prefix testdata/fixtures/typescript/rename
          npm ci --prefix testdata/fixtures/javascript/rename

      - name: Run Go ts-morph tests
        if: steps.changes.outputs.tsmorph == 'true' || github.event_name == 'workflow_dispatch'
        env:
          TSMORPH_REQUIRED: "1"
        run: go test ./internal/backend/tsmorph

  shim-conformance:
    name: Toolchain shim conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Rust toolchain (cargo) ships on the ubuntu-latest image; no setup step
      # needed. The harness reports SKIP rather than failing if any toolchain is
      # absent, so a future image change degrades visibly instead of silently.
      - name: Run cross-shim conformance harness
        run: ./scripts/shim-conformance.sh

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.30.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" gitleaks
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --verbose
