name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go test and analysis gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install supported Go integration backend
        run: |
          go install golang.org/x/tools/gopls@latest

      - name: Install experimental integration backends and fixture dependencies
        continue-on-error: true
        run: |
          rustup component add rust-analyzer
          npm ci --prefix testdata/fixtures/typescript/rename
          npm ci --prefix testdata/fixtures/javascript/rename

      - name: Check Go formatting
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if ((${#go_files[@]} == 0)); then
            exit 0
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run unit tests
        run: go test ./...

      - name: Run unit tests with race detector
        run: go test -race -timeout 120s ./...

      - name: Run supported Go integration tests
        run: go test -tags integration ./internal/

      - name: Run experimental integration tests
        continue-on-error: true
        env:
          REFUTE_EXPERIMENTAL_INTEGRATION: "1"
        run: go test -tags integration ./internal/

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run ShellCheck on tracked shell scripts
        shell: bash
        run: |
          mapfile -t shell_scripts < <(git ls-files '*.sh')
          if ((${#shell_scripts[@]} == 0)); then
            echo "No tracked shell scripts found."
            exit 0
          fi

          shellcheck "${shell_scripts[@]}"

  openrewrite:
    name: OpenRewrite adapter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build OpenRewrite adapter
        run: mvn -B verify --file adapters/openrewrite/pom.xml

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
