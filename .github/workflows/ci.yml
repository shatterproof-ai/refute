name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go test and analysis gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install integration backends
        run: |
          go install golang.org/x/tools/gopls@latest
          rustup component add rust-analyzer

      - name: Check Go formatting
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if ((${#go_files[@]} == 0)); then
            exit 0
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files are not gofmt-formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run unit tests
        run: go test ./...

      - name: Run integration tests
        run: go test -tags integration ./internal/

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run ShellCheck on tracked shell scripts
        shell: bash
        run: |
          mapfile -t shell_scripts < <(git ls-files '*.sh')
          if ((${#shell_scripts[@]} == 0)); then
            echo "No tracked shell scripts found."
            exit 0
          fi

          shellcheck "${shell_scripts[@]}"

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
