name: Nightly Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  gate:
    name: Require successful CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ci_ok: ${{ steps.gate.outputs.ci_ok }}
      target_sha: ${{ steps.gate.outputs.target_sha }}

    steps:
      - name: Resolve publish commit
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            echo "target_sha=${WORKFLOW_RUN_HEAD_SHA}" >> "$GITHUB_OUTPUT"
            if [[ "${WORKFLOW_RUN_CONCLUSION}" == "success" ]]; then
              echo "ci_ok=true" >> "$GITHUB_OUTPUT"
            else
              echo "ci_ok=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          target_sha="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq '.sha')"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

          success_count="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${target_sha}&status=success&per_page=1" \
              --jq '.workflow_runs | map(select(.conclusion == "success")) | length'
          )"
          if (( success_count == 0 )); then
            echo "ci_ok=false" >> "$GITHUB_OUTPUT"
            echo "::error::CI has not succeeded for ${target_sha}; refusing to publish nightly."
            exit 1
          fi

          echo "ci_ok=true" >> "$GITHUB_OUTPUT"

  nightly:
    name: Build unofficial nightly
    needs: gate
    if: needs.gate.outputs.ci_ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check cooldown
        id: cooldown
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual run bypasses cooldown."
            exit 0
          fi

          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/nightly" 2>/dev/null || true)"
          published_at="$(jq -r '.published_at // empty' <<< "${release_json}")"

          if [[ -z "${published_at}" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "No existing nightly release; proceeding."
            exit 0
          fi

          now_epoch="$(date -u +%s)"
          published_epoch="$(date -u -d "${published_at}" +%s)"
          age_seconds="$((now_epoch - published_epoch))"

          if (( age_seconds < 300 )); then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping nightly release; previous nightly was published ${age_seconds}s ago."
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "Previous nightly is ${age_seconds}s old; proceeding."

      - name: Check out main
        if: steps.cooldown.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.target_sha }}
          fetch-depth: 0

      - name: Set up Go
        if: steps.cooldown.outputs.proceed == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Java
        if: steps.cooldown.outputs.proceed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compute nightly metadata
        if: steps.cooldown.outputs.proceed == 'true'
        id: meta
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          date_stamp="$(date -u +%Y%m%d)"
          version="nightly-${date_stamp}-${short_sha}-${GITHUB_RUN_ID}"
          {
            echo "short_sha=${short_sha}"
            echo "build_date=${build_date}"
              echo "version=${version}"
            } >> "$GITHUB_OUTPUT"

      - name: Build archives
        if: steps.cooldown.outputs.proceed == 'true'
        env:
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: ./scripts/release.sh "${{ steps.meta.outputs.version }}"

      - name: Upload workflow artifacts
        if: steps.cooldown.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: refute-${{ steps.meta.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.tgz
            dist/*.whl
            dist/refute-manifest-*.json
            dist/checksums.txt
            dist/release-notes.md

      - name: Publish immutable nightly prerelease
        if: steps.cooldown.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git tag "$NIGHTLY_VERSION" "$(git rev-parse HEAD)"
          git push origin "refs/tags/$NIGHTLY_VERSION"
          gh release create "$NIGHTLY_VERSION" \
            dist/*.tar.gz \
            dist/*.tgz \
            dist/*.whl \
            dist/refute-manifest-*.json \
            dist/checksums.txt \
            --verify-tag \
            --title "Nightly ${NIGHTLY_VERSION}" \
            --notes-file dist/release-notes.md \
            --prerelease

      - name: Move nightly tag
        if: steps.cooldown.outputs.proceed == 'true'
        run: |
          git tag -f nightly "$(git rev-parse HEAD)"
          git push origin refs/tags/nightly --force

      - name: Publish nightly prerelease
        if: steps.cooldown.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NIGHTLY_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gh release delete nightly --yes || true
          gh release create nightly \
            dist/*.tar.gz \
            dist/*.tgz \
            dist/*.whl \
            dist/refute-manifest-*.json \
            dist/checksums.txt \
            --verify-tag \
            --title "Nightly ${NIGHTLY_VERSION}" \
            --notes-file dist/release-notes.md \
            --prerelease
