name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Existing vX.Y.Z tag to release
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build archives
        run: ./scripts/release.sh "$RELEASE_VERSION"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: refute-${{ env.RELEASE_VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.tgz
            dist/*.whl
            dist/refute-manifest-*.json
            dist/checksums.txt
            dist/release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_VERSION" \
            dist/*.tar.gz \
            dist/*.tgz \
            dist/*.whl \
            dist/refute-manifest-*.json \
            dist/checksums.txt \
            --verify-tag \
            --title "$RELEASE_VERSION" \
            --notes-file dist/release-notes.md
